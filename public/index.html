<!DOCTYPE html>
<!-- 송도마스터즈 통합 홈 — 공지사항, 다음 라운딩 D-day, 메뉴 카드를 한눈에 보여주는 첫 화면 -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>송도마스터즈 골프회</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #006747;
            --gold: #c9a84c;
            --gold-dark: #a07830;
            --bg: #eef2ee;
            --text-main: #1a2e1a;
            --text-muted: #6b8270;
            --border: rgba(0, 103, 71, 0.14);
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(0,103,71,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(201,168,76,0.06) 0%, transparent 60%);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .wrapper { max-width: 560px; margin: 0 auto; padding: 20px 16px; }
        .header { text-align: center; padding: 16px 0 20px; position: relative; }
        .header h1 { font-size: 1.7rem; font-weight: 900; margin: 8px 0 6px; color: var(--primary); letter-spacing: -0.5px; }
        .header h1 .gold { color: var(--gold); }
        .subtitle { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 2.5px; margin: 0; }
        .admin-btn { position: absolute; top: 0; right: 0; background: none; border: none; font-size: 20px; cursor: pointer; opacity: 0.55; }

        .card { background: #fff; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,103,71,0.08); }

        .notice-card { padding: 14px 16px; margin-bottom: 14px; border-left: 4px solid var(--gold); border-radius: 0 16px 16px 0; }
        .notice-title { font-size: 0.82rem; font-weight: 800; color: var(--gold-dark); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .notice-item { font-size: 0.92rem; padding: 7px 0; border-bottom: 1px dashed var(--border); white-space: pre-wrap; word-break: break-all; line-height: 1.55; }
        .notice-item:last-child { border-bottom: none; }
        .notice-date { font-size: 0.72rem; color: var(--text-muted); margin-left: 6px; }
        .notice-empty { font-size: 0.88rem; color: var(--text-muted); padding: 6px 0; }
        .notice-del { background: none; border: none; color: #c0392b; font-size: 0.8rem; cursor: pointer; float: right; }

        .dday-card { background: var(--primary); color: #fff; border-radius: 16px; padding: 16px 18px; margin-bottom: 14px;
                     display: flex; justify-content: space-between; align-items: center; gap: 10px;
                     box-shadow: 0 6px 20px rgba(0,103,71,0.25); }
        .dday-label { font-size: 0.78rem; color: #9fe1cb; margin-bottom: 3px; }
        .dday-main { font-size: 1.02rem; font-weight: 800; }
        .dday-sub { font-size: 0.8rem; color: rgba(255,255,255,0.75); margin-top: 2px; }
        .dday-btn { background: var(--gold); color: #2c2208; font-weight: 800; font-size: 0.95rem;
                    padding: 13px 20px; border-radius: 26px; text-decoration: none; white-space: nowrap; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .menu-card { padding: 22px 10px; text-align: center; text-decoration: none; color: var(--text-main); transition: transform 0.1s; }
        .menu-card:active { transform: scale(0.97); }
        .menu-icon { font-size: 34px; display: block; margin-bottom: 8px; }
        .menu-name { font-size: 1.02rem; font-weight: 800; color: var(--primary); }
        .menu-desc { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center; padding: 16px; }
        .modal.active { display: flex; }
        .modal-content { background: #fff; border-radius: 16px; padding: 22px; width: 100%; max-width: 420px; }
        .modal-content h3 { margin: 0 0 14px; color: var(--primary); }
        .modal-content textarea { width: 100%; min-height: 90px; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px; font-family: inherit; font-size: 0.95rem; }
        .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
        .modal-actions button { flex: 1; padding: 13px; border: none; border-radius: 10px; font-weight: 700; font-size: 0.95rem; cursor: pointer; font-family: inherit; }
        .btn-cancel { background: rgba(0,0,0,0.07); color: var(--text-muted); }
        .btn-save { background: var(--primary); color: #fff; }

        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(120px); background: var(--primary); color: white;
                 padding: 12px 28px; border-radius: 26px; font-weight: 700; transition: transform 0.3s; z-index: 10001; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <button id="admin-btn" class="admin-btn" onclick="toggleAdmin()">🔒</button>
            <svg width="84" height="84" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block; margin:0 auto; filter:drop-shadow(0 6px 18px rgba(0,103,71,0.35));">
                <defs><clipPath id="circleClip"><circle cx="45" cy="45" r="41"/></clipPath></defs>
                <circle cx="45" cy="45" r="41" fill="#006747"/>
                <g clip-path="url(#circleClip)">
                    <path d="M4 66 Q22 56 45 60 Q68 64 86 54 L86 90 L4 90 Z" fill="#004d35"/>
                    <line x1="45" y1="65" x2="45" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M45 25 C53 22 64 26 66 23 C61 30 53 33 45 38 Z" fill="#c9a84c"/>
                    <circle cx="45" cy="66" r="4" fill="white"/>
                    <circle cx="43.5" cy="64.5" r="1.4" fill="rgba(255,255,255,0.45)"/>
                </g>
                <circle cx="45" cy="45" r="41" stroke="#c9a84c" stroke-width="3" fill="none"/>
                <circle cx="45" cy="45" r="35" stroke="rgba(201,168,76,0.6)" stroke-width="1" fill="none"/>
            </svg>
            <h1>송도마스터즈<span class="gold">골프회</span></h1>
            <p class="subtitle">SONGDO MASTERS GOLF CLUB</p>
        </header>

        <section id="notice-card" class="card notice-card">
            <div class="notice-title">
                <span>📢 공지사항</span>
                <button id="notice-add-btn" style="display:none; background:var(--primary); color:#fff; border:none; border-radius:14px; padding:4px 12px; font-size:0.78rem; font-weight:700; cursor:pointer; font-family:inherit;" onclick="openNoticeModal()">+ 작성</button>
            </div>
            <div id="notice-list"><div class="notice-empty">등록된 공지가 없습니다.</div></div>
        </section>

        <section id="dday-card" class="dday-card" style="display:none;">
            <div>
                <div class="dday-label" id="dday-label">다음 라운딩</div>
                <div class="dday-main" id="dday-main"></div>
                <div class="dday-sub" id="dday-sub"></div>
            </div>
            <a class="dday-btn" href="/vote/">투표하기</a>
        </section>

        <div class="menu-grid">
            <a class="card menu-card" href="/vote/">
                <span class="menu-icon">⛳</span>
                <span class="menu-name">투표</span>
                <div class="menu-desc">참석 여부 제출</div>
            </a>
            <a class="card menu-card" href="/jo/">
                <span class="menu-icon">👥</span>
                <span class="menu-name">조편성</span>
                <div class="menu-desc">조별 명단 확인</div>
            </a>
            <a class="card menu-card" href="/prize/?view=sponsor">
                <span class="menu-icon">💰</span>
                <span class="menu-name">찬조</span>
                <div class="menu-desc">찬조 등록 · 현황</div>
            </a>
            <a class="card menu-card" href="/prize/?view=award">
                <span class="menu-icon">🏆</span>
                <span class="menu-name">시상품</span>
                <div class="menu-desc">시상 내역 · 수상자</div>
            </a>
            <a class="card menu-card" href="/jo/?tab=score">
                <span class="menu-icon">📊</span>
                <span class="menu-name">성적 · 핸디</span>
                <div class="menu-desc">성적/핸디 관리</div>
            </a>
            <a class="card menu-card" href="/contact/">
                <span class="menu-icon">📞</span>
                <span class="menu-name">연락처</span>
                <div class="menu-desc">회원 연락망</div>
            </a>
            <a class="card menu-card" href="/pair/" style="grid-column: 1 / -1; padding: 16px 10px;">
                <span class="menu-icon" style="font-size:28px; margin-bottom:4px;">⚔️</span>
                <span class="menu-name">짝꿍대전</span>
                <div class="menu-desc">2026 송마 짝꿍대전 토너먼트 대진표 · 총상금 80만원</div>
            </a>
        </div>
    </div>

    <div id="modal-notice" class="modal">
        <div class="modal-content">
            <h3>공지사항 작성</h3>
            <textarea id="notice-text" placeholder="공지 내용을 입력하세요"></textarea>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeNoticeModal()">취소</button>
                <button class="btn-save" onclick="saveNotice()">등록</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">저장되었습니다!</div>

    <script>
        let noticeData = { items: [] };
        let isAdmin = false;

        async function loadNotices() {
            try {
                const res = await fetch('/api/notice/load');
                noticeData = await res.json();
                if (!noticeData.items) noticeData = { items: [] };
            } catch (e) { noticeData = { items: [] }; }
            renderNotices();
        }

        function renderNotices() {
            const list = document.getElementById('notice-list');
            if (!noticeData.items.length) {
                list.innerHTML = '<div class="notice-empty">등록된 공지가 없습니다.</div>';
                return;
            }
            list.innerHTML = noticeData.items.map(n =>
                `<div class="notice-item">${isAdmin ? `<button class="notice-del" onclick="deleteNotice(${n.id})">삭제</button>` : ''}${escapeHtml(n.text)}<span class="notice-date">${n.date}</span></div>`
            ).join('');
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function toggleAdmin() {
            if (isAdmin) { isAdmin = false; }
            else {
                const pwd = prompt('관리자 비밀번호를 입력하세요.');
                if (pwd === '1234') isAdmin = true;
                else if (pwd !== null) { alert('비밀번호가 틀렸습니다.'); return; }
                else return;
            }
            document.getElementById('notice-add-btn').style.display = isAdmin ? 'inline-block' : 'none';
            document.getElementById('admin-btn').innerText = isAdmin ? '🔓' : '🔒';
            renderNotices();
        }

        function openNoticeModal() {
            document.getElementById('notice-text').value = '';
            document.getElementById('modal-notice').classList.add('active');
        }
        function closeNoticeModal() {
            document.getElementById('modal-notice').classList.remove('active');
        }

        async function saveNotice() {
            const text = document.getElementById('notice-text').value.trim();
            if (!text) { alert('내용을 입력하세요.'); return; }
            const d = new Date();
            noticeData.items.unshift({
                id: Date.now(),
                text: text,
                date: `${d.getMonth() + 1}/${d.getDate()}`
            });
            await persistNotices();
            closeNoticeModal();
        }

        async function deleteNotice(id) {
            if (!confirm('이 공지를 삭제할까요?')) return;
            noticeData.items = noticeData.items.filter(n => n.id !== id);
            await persistNotices();
        }

        async function persistNotices() {
            try {
                const res = await fetch('/api/notice/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(noticeData)
                });
                if ((await res.text()) === 'success') {
                    renderNotices();
                    showToast('저장되었습니다!');
                } else alert('저장에 실패했습니다.');
            } catch (e) { alert('저장에 실패했습니다.'); }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        async function loadDday() {
            let target = null;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            try {
                const res = await fetch('/api/vote/load');
                const data = await res.json();
                const actives = (data.polls || [])
                    .filter(p => p.status === 'active' && new Date(p.date) >= today)
                    .sort((a, b) => new Date(a.date) - new Date(b.date));
                if (actives.length) {
                    const p = actives[0];
                    target = {
                        title: p.title || `${new Date(p.date).getMonth() + 1}월 정기라운딩`,
                        date: new Date(p.date),
                        sub: `${p.course} · ${p.time}`
                    };
                }
            } catch (e) {}

            if (!target) return;
            const dayDiff = Math.round((target.date - today) / 86400000);
            const mm = target.date.getMonth() + 1;
            const dd = target.date.getDate();
            const days = ['일','월','화','수','목','금','토'];
            document.getElementById('dday-label').innerText = dayDiff === 0 ? '오늘 라운딩!' : `다음 라운딩 D-${dayDiff}`;
            document.getElementById('dday-main').innerText = target.title;
            document.getElementById('dday-sub').innerText = `${mm}/${dd}(${days[target.date.getDay()]}) · ${target.sub}`;
            document.getElementById('dday-card').style.display = 'flex';
        }

        loadNotices();
        loadDday();
    </script>
    <script src="/nav.js" data-active="home"></script>
</body>
</html>
