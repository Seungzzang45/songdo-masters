<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>송도마스터즈 골프회 - 투표 시스템</title>
    <link rel="stylesheet" href="vote.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <button id="admin-btn" class="admin-btn" onclick="toggleAdmin()">🔒</button>

            <svg class="club-emblem" width="100" height="100" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <clipPath id="circleClip">
                        <circle cx="45" cy="45" r="41"/>
                    </clipPath>
                </defs>
                <!-- Main green circle -->
                <circle cx="45" cy="45" r="41" fill="#006747"/>
                <!-- Clipped content -->
                <g clip-path="url(#circleClip)">
                    <!-- Dark fairway hill -->
                    <path d="M4 66 Q22 56 45 60 Q68 64 86 54 L86 90 L4 90 Z" fill="#004d35"/>
                    <!-- Flag pole -->
                    <line x1="45" y1="65" x2="45" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    <!-- Gold waving flag -->
                    <path d="M45 25 C53 22 64 26 66 23 C61 30 53 33 45 38 Z" fill="#c9a84c"/>
                    <!-- Golf ball on green -->
                    <circle cx="45" cy="66" r="4" fill="white"/>
                    <circle cx="43.5" cy="64.5" r="1.4" fill="rgba(255,255,255,0.45)"/>
                </g>
                <!-- Gold outer border -->
                <circle cx="45" cy="45" r="41" stroke="#c9a84c" stroke-width="3" fill="none"/>
                <!-- Gold inner ring -->
                <circle cx="45" cy="45" r="35" stroke="rgba(201,168,76,0.6)" stroke-width="1" fill="none"/>
                <!-- Side gold dots -->
                <circle cx="19" cy="45" r="2.2" fill="#c9a84c" opacity="0.7"/>
                <circle cx="71" cy="45" r="2.2" fill="#c9a84c" opacity="0.7"/>
            </svg>

            <h1>송도마스터즈<span class="gold">투표</span></h1>
            <div class="header-divider"></div>
            <p class="subtitle">SONGDO MASTERS GOLF CLUB</p>
        </header>

        <!-- Admin Panel -->
        <section id="admin-panel" class="admin-panel glass">
            <h2>관리자 메뉴 <button class="btn btn-sm btn-danger" onclick="logoutAdmin()">로그아웃</button></h2>
            <div class="grid-2 mt-3">
                <button class="btn btn-primary" onclick="openCreateModal('regular')">정규 라운딩 생성</button>
                <button class="btn btn-primary" style="background: linear-gradient(to right, var(--gold), #d97706);" onclick="openCreateModal('event')">이벤트 라운딩 생성</button>
            </div>
        </section>

        <main id="main-content">
            <div id="loader" class="loader"></div>

            <div class="tabs" id="poll-tabs" style="display: none;">
                <div class="tab active" onclick="switchTab('active')">진행중 투표</div>
                <div class="tab" onclick="switchTab('closed')">지난 투표</div>
            </div>

            <div id="month-selector" class="month-selector" style="display: none;"></div>

            <div id="polls-container"></div>
        </main>
    </div>

    <!-- Create Poll Modal -->
    <div id="modal-create" class="modal">
        <div class="modal-content glass">
            <h3 id="modal-title">투표 생성</h3>
            <form id="form-create">
                <input type="hidden" id="poll-type">
                
                <div class="form-group" id="group-title" style="display: none;">
                    <label>투표 제목</label>
                    <input type="text" id="poll-title" class="form-control" placeholder="예: 송년회 특별 라운딩">
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>날짜</label>
                        <input type="date" id="poll-date" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>시간대</label>
                        <input type="time" id="poll-time" class="form-control" value="13:00" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>장소 (구장)</label>
                    <select id="poll-course" class="form-control" required>
                        <option value="클럽72 하늘코스">클럽72 하늘코스</option>
                        <option value="클럽72 오션코스">클럽72 오션코스</option>
                        <option value="클럽72 레이크코스">클럽72 레이크코스</option>
                        <option value="클럽72 클래식코스">클럽72 클래식코스</option>
                        <option value="골프존카운티 송도">골프존카운티 송도</option>
                        <option value="기타(직접입력)">기타 (직접입력)</option>
                    </select>
                </div>
                
                <div class="form-group" id="group-custom-course" style="display: none;">
                    <input type="text" id="poll-custom-course" class="form-control" placeholder="구장 이름을 입력하세요">
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>그린피</label>
                        <input type="number" id="poll-fee" class="form-control" value="200000" required>
                    </div>
                    <div class="form-group">
                        <label>예정 팀수</label>
                        <input type="number" id="poll-teams" class="form-control" value="6" min="1" max="20" required>
                    </div>
                </div>

                <!-- Custom Options Section -->
                <div class="form-group" style="margin-top: 20px;">
                    <label style="color:var(--gold);">투표 선택지 설정</label>
                    <div id="options-container">
                        <!-- Options will be added here -->
                    </div>
                    <button type="button" class="btn btn-sm" style="background:rgba(255,255,255,0.1); color:white; width:auto; margin-top:10px;" onclick="addOptionField()">+ 선택지 추가</button>
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label style="display:flex; align-items:center; gap:10px; cursor:pointer; color: var(--text-main);">
                        <input type="checkbox" id="poll-allow-revote" style="width:auto; accent-color: var(--primary);">
                        <span>복수선택 허용 (중복투표)</span>
                    </label>
                    <small style="color:var(--text-muted); margin-top:4px; display:block;">허용 시 여러 항목을 동시에 선택할 수 있습니다</small>
                </div>

                <div class="modal-actions mt-3">
                    <button type="button" class="btn" style="background: rgba(255,255,255,0.1); color: white;" onclick="closeModal('modal-create')">취소</button>
                    <button type="submit" class="btn btn-primary">생성하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Vote Toast -->
    <div id="toast" class="toast">저장되었습니다!</div>

    <script src="vote.js"></script>
</body>
</html>
